<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>今日の元気パズル</title>
  <style>
    :root {
      --paper: #fffaf2;
      --surface: #ffffff;
      --ink: #2f2a24;
      --muted: #6f665c;
      --line: #e5d7c0;
      --accent: #0f8b8d;
      --accent-dark: #09696b;
      --warm: #f3a712;
      --good: #2f9e44;
      --soft: #f8efe0;
      --red: #e5484d;
      --green: #1f9d6a;
      --blue: #2563eb;
      --purple: #8b5cf6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 16px;
      background:
        linear-gradient(120deg, rgba(15, 139, 141, 0.08), transparent 38%),
        linear-gradient(300deg, rgba(243, 167, 18, 0.12), transparent 42%),
        var(--paper);
      color: var(--ink);
      font-family: "Hiragino Sans", "Yu Gothic UI", "Yu Gothic", Meiryo, sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }

    .app {
      width: min(100%, 440px);
      min-height: min(760px, calc(100vh - 32px));
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--surface);
      border: 2px solid var(--line);
      border-radius: 24px;
      box-shadow: 0 18px 45px rgba(62, 46, 27, 0.16);
    }

    header {
      padding: 18px 18px 14px;
      background: var(--soft);
      border-bottom: 1px solid var(--line);
      text-align: center;
    }

    h1, h2, h3, p {
      margin: 0;
    }

    h1 {
      font-size: 24px;
      line-height: 1.25;
      font-weight: 900;
      letter-spacing: 0;
    }

    header p {
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    main {
      position: relative;
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 18px;
    }

    .screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 18px;
    }

    .hidden {
      display: none !important;
    }

    .hero-icon {
      width: 132px;
      height: 132px;
      margin: 0 auto;
      display: block;
    }

    .lead {
      color: var(--muted);
      font-size: 17px;
      font-weight: 700;
      line-height: 1.75;
      text-align: center;
    }

    .button {
      width: 100%;
      min-height: 60px;
      border: 0;
      border-radius: 16px;
      background: var(--accent);
      color: white;
      font: inherit;
      font-size: 20px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: inset 0 -4px 0 rgba(0, 0, 0, 0.18), 0 8px 18px rgba(15, 139, 141, 0.25);
      transition: transform 0.15s ease, background 0.15s ease;
    }

    .button:active {
      transform: scale(0.97);
      background: var(--accent-dark);
    }

    .button.secondary {
      background: #f1eee8;
      color: var(--ink);
      box-shadow: inset 0 -3px 0 rgba(0, 0, 0, 0.08);
    }

    .status {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
    }

    .progress {
      height: 12px;
      overflow: hidden;
      background: #ece7df;
      border-radius: 999px;
    }

    .progress span {
      display: block;
      width: 0;
      height: 100%;
      background: var(--accent);
      transition: width 0.25s ease;
    }

    .question {
      padding: 14px;
      background: #f7fbfb;
      border: 1px solid #d5eeee;
      border-radius: 14px;
      text-align: center;
    }

    .question h2 {
      font-size: 20px;
      line-height: 1.55;
    }

    .picture {
      min-height: 184px;
      display: grid;
      place-items: center;
      padding: 12px;
      background: #fff6e6;
      border: 2px dashed #e6c883;
      border-radius: 18px;
    }

    .picture svg {
      width: 100%;
      max-height: 170px;
    }

    .hint {
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
      text-align: center;
    }

    .choices {
      display: grid;
      gap: 10px;
    }

    .choice {
      min-height: 64px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px;
      border: 2px solid #ded8cf;
      border-radius: 16px;
      background: white;
      color: var(--ink);
      font: inherit;
      cursor: pointer;
      text-align: left;
      box-shadow: 0 5px 12px rgba(50, 43, 35, 0.08);
      transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
    }

    .choice:active {
      transform: scale(0.98);
    }

    .choice-number {
      width: 42px;
      height: 42px;
      flex: 0 0 42px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: #fff1c7;
      border: 1px solid #e9c96e;
      color: #7c5600;
      font-size: 20px;
      font-weight: 900;
    }

    .choice-text {
      font-size: 18px;
      font-weight: 900;
      line-height: 1.35;
    }

    .overlay {
      position: absolute;
      inset: 0;
      z-index: 3;
      display: grid;
      place-items: center;
      padding: 28px;
      background: rgba(255, 255, 255, 0.94);
      text-align: center;
    }

    .feedback {
      display: grid;
      gap: 12px;
    }

    .feedback-icon {
      font-size: 70px;
      line-height: 1;
    }

    .feedback h2 {
      font-size: 28px;
      font-weight: 900;
    }

    .feedback p {
      color: var(--muted);
      font-size: 18px;
      font-weight: 800;
      line-height: 1.65;
    }

    .result-card {
      display: grid;
      gap: 12px;
      padding: 16px;
      background: #fff7e8;
      border: 1px solid #ead29c;
      border-radius: 18px;
      text-align: center;
    }

    .score {
      color: #c77900;
      font-size: 44px;
      font-weight: 900;
      line-height: 1;
    }

    .result-card p {
      color: var(--muted);
      font-weight: 800;
      line-height: 1.65;
    }

    .family-note {
      display: grid;
      gap: 10px;
      padding: 14px;
      border: 1px solid #cfe7df;
      border-radius: 18px;
      background: #f3fbf8;
    }

    .family-note h3 {
      color: #12724f;
      font-size: 16px;
      font-weight: 900;
    }

    .family-note p {
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
      line-height: 1.6;
    }

    footer {
      padding: 12px;
      background: #f7f3ec;
      border-top: 1px solid var(--line);
      color: #8d8276;
      font-size: 11px;
      font-weight: 700;
      text-align: center;
    }

    @media (max-width: 380px) {
      body {
        padding: 8px;
      }

      .app {
        min-height: calc(100vh - 16px);
        border-radius: 18px;
      }

      main {
        padding: 14px;
      }

      h1 {
        font-size: 21px;
      }

      .question h2 {
        font-size: 18px;
      }

      .choice-text {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>今日の元気パズル</h1>
      <p>1日1回、楽しく頭を動かす小さな脳活</p>
    </header>

    <main>
      <section id="screen-start" class="screen">
        <svg class="hero-icon" viewBox="0 0 160 160" role="img" aria-label="花とパズルの絵">
          <circle cx="80" cy="80" r="72" fill="#fff3cf" stroke="#f3a712" stroke-width="5"/>
          <circle cx="80" cy="48" r="18" fill="#ef476f"/>
          <circle cx="111" cy="68" r="18" fill="#06d6a0"/>
          <circle cx="99" cy="105" r="18" fill="#118ab2"/>
          <circle cx="61" cy="105" r="18" fill="#ffd166"/>
          <circle cx="49" cy="68" r="18" fill="#8b5cf6"/>
          <circle cx="80" cy="80" r="17" fill="#ffffff"/>
        </svg>
        <div>
          <h2 style="text-align:center;font-size:26px;font-weight:900;">今日も、ゆっくり始めましょう</h2>
          <p class="lead" style="margin-top:12px;">色、形、向きを見ながら、いちばん合う答えを選びます。急がなくて大丈夫です。</p>
        </div>
        <button class="button" type="button" onclick="startGame()">はじめる</button>
      </section>

      <section id="screen-game" class="screen hidden">
        <div class="status">
          <span id="question-number">第1問 / 全7問</span>
          <span id="score-display">ゆっくりでOK</span>
        </div>
        <div class="progress" aria-hidden="true"><span id="progress-bar"></span></div>
        <div class="question"><h2 id="question-text"></h2></div>
        <div class="picture" id="canvas-area"></div>
        <p class="hint">下の3つから、合うものを1つ選んでください</p>
        <div class="choices">
          <button class="choice" type="button" onclick="selectAnswer(1)">
            <span class="choice-number">1</span><span id="choice-1-text" class="choice-text"></span>
          </button>
          <button class="choice" type="button" onclick="selectAnswer(2)">
            <span class="choice-number">2</span><span id="choice-2-text" class="choice-text"></span>
          </button>
          <button class="choice" type="button" onclick="selectAnswer(3)">
            <span class="choice-number">3</span><span id="choice-3-text" class="choice-text"></span>
          </button>
        </div>
      </section>

      <section id="screen-result" class="screen hidden">
        <div style="text-align:center;">
          <h2 style="font-size:27px;font-weight:900;">おつかれさまでした</h2>
          <p class="lead" style="margin-top:8px;">今日のパズルはここまでです。</p>
        </div>
        <div class="result-card">
          <h3>今日のスコア</h3>
          <div class="score"><span id="final-score">0</span> / 7</div>
          <p id="result-comment"></p>
        </div>
        <div class="family-note">
          <h3>家族への通知イメージ</h3>
          <p id="family-message"></p>
          <p>実際のアプリでは、この結果をLINE、メール、SMSなどに送る形へ広げられます。</p>
        </div>
        <button class="button secondary" type="button" onclick="resetGame()">もう一度あそぶ</button>
      </section>

      <div id="feedback-overlay" class="overlay hidden">
        <div class="feedback">
          <div id="feedback-icon" class="feedback-icon">○</div>
          <h2 id="feedback-title">正解です</h2>
          <p id="feedback-detail"></p>
        </div>
      </div>
    </main>

    <footer>見守り・脳活アプリの試作品</footer>
  </div>

  <script>
    let audioCtx = null;

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
    }

    function playSound(type) {
      initAudio();
      if (!audioCtx) return;

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const now = audioCtx.currentTime;
      osc.connect(gain);
      gain.connect(audioCtx.destination);

      if (type === "correct") {
        osc.type = "sine";
        osc.frequency.setValueAtTime(523.25, now);
        osc.frequency.setValueAtTime(659.25, now + 0.12);
        gain.gain.setValueAtTime(0.16, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.35);
        osc.start(now);
        osc.stop(now + 0.35);
      } else {
        osc.type = "triangle";
        osc.frequency.setValueAtTime(330, now);
        osc.frequency.setValueAtTime(294, now + 0.15);
        gain.gain.setValueAtTime(0.13, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.45);
        osc.start(now);
        osc.stop(now + 0.45);
      }
    }

    const quizData = [
      {
        question: "赤い丸、緑の四角、青い三角と並んでいます。次に入る形はどれでしょう？",
        svg: `
          <svg viewBox="0 0 320 120" aria-label="赤丸、緑四角、青三角、赤丸、緑四角、はてな">
            <circle cx="32" cy="62" r="22" fill="var(--red)" />
            <rect x="78" y="40" width="44" height="44" rx="7" fill="var(--green)" />
            <polygon points="170,38 145,84 195,84" fill="var(--blue)" />
            <circle cx="235" cy="62" r="22" fill="var(--red)" />
            <rect x="272" y="40" width="44" height="44" rx="7" fill="var(--green)" />
            <text x="314" y="75" fill="var(--warm)" font-size="34" font-weight="900" text-anchor="middle">?</text>
          </svg>
        `,
        choices: ["赤い丸", "青い三角", "緑の四角"],
        correct: 2,
        comment: "赤、緑、青の順番でくり返しています。次は青い三角です。"
      },
      {
        question: "矢印が右へ90度ずつ回っています。次の向きはどれでしょう？",
        svg: `
          <svg viewBox="0 0 320 120" aria-label="上、右、下、はてなの矢印">
            ${arrowBox(44, 60, 0)}
            ${smallArrow(94, 60)}
            ${arrowBox(134, 60, 90)}
            ${smallArrow(184, 60)}
            ${arrowBox(224, 60, 180)}
            <rect x="272" y="30" width="54" height="54" rx="9" fill="#fff7db" stroke="var(--warm)" stroke-width="3" stroke-dasharray="5"/>
            <text x="299" y="68" fill="var(--warm)" font-size="30" font-weight="900" text-anchor="middle">?</text>
          </svg>
        `,
        choices: ["左向き", "上向き", "右向き"],
        correct: 1,
        comment: "上、右、下と回ったので、次は左向きです。"
      },
      {
        question: "大きな四角から、中の青い四角を取り出しました。残る形はどれでしょう？",
        svg: `
          <svg viewBox="0 0 320 120" aria-label="四角から中の四角を引く">
            <rect x="36" y="28" width="60" height="60" rx="5" fill="none" stroke="#1f3f8f" stroke-width="4"/>
            <rect x="57" y="49" width="18" height="18" rx="2" fill="var(--blue)"/>
            <text x="126" y="70" fill="var(--ink)" font-size="34" font-weight="900" text-anchor="middle">-</text>
            <rect x="156" y="49" width="18" height="18" rx="2" fill="var(--blue)"/>
            <text x="210" y="70" fill="var(--ink)" font-size="34" font-weight="900" text-anchor="middle">=</text>
            <rect x="246" y="28" width="60" height="60" rx="5" fill="#fff7db" stroke="var(--warm)" stroke-width="3" stroke-dasharray="5"/>
            <text x="276" y="68" fill="var(--warm)" font-size="30" font-weight="900" text-anchor="middle">?</text>
          </svg>
        `,
        choices: ["外側の四角い枠", "青い四角", "丸い形"],
        correct: 1,
        comment: "中の青い四角を取ると、外側の枠だけが残ります。"
      },
      {
        question: "積み木は全部でいくつあるでしょう？ 見えにくい奥の1つも数えます。",
        svg: `
          <svg viewBox="0 0 320 150" aria-label="5個の積み木">
            <g transform="translate(83, 18)">
              ${cube(62, 0, "#38bdf8")}
              ${cube(28, 35, "#38bdf8")}
              ${cube(96, 35, "#38bdf8")}
              ${cube(62, 70, "#38bdf8")}
              <g opacity="0.45">${cube(28, 0, "#38bdf8")}</g>
            </g>
            <text x="50" y="130" fill="var(--muted)" font-size="15" font-weight="800">奥にも1つ</text>
          </svg>
        `,
        choices: ["4個", "5個", "6個"],
        correct: 2,
        comment: "見えている4個に、奥で少し隠れている1個を足して、全部で5個です。"
      },
      {
        question: "真上から見ると、どんな形に見えるでしょう？",
        svg: `
          <svg viewBox="0 0 320 140" aria-label="青い箱の上に黄色い丸">
            <g transform="translate(116, 18)">
              ${cube(0, 18, "#3b82f6")}
              <circle cx="34" cy="28" r="18" fill="#f3a712" stroke="#c77900" stroke-width="3"/>
            </g>
            <text x="160" y="126" fill="var(--muted)" font-size="15" font-weight="800" text-anchor="middle">青い四角の上に黄色い丸</text>
          </svg>
        `,
        choices: ["青い四角の中に、黄色い丸", "青い四角と黄色い丸が横並び", "黄色い丸だけ"],
        correct: 1,
        comment: "上から見ると、高さは見えにくくなり、四角の中に丸があるように見えます。"
      },
      {
        question: "同じ組み合わせになるように、空いている場所へ入るものはどれでしょう？",
        svg: `
          <svg viewBox="0 0 320 140" aria-label="傘と靴のペア">
            <rect x="66" y="18" width="188" height="98" rx="12" fill="#fff" stroke="#c9c0b4" stroke-width="3"/>
            <line x1="160" y1="18" x2="160" y2="116" stroke="#e4ddd4" stroke-width="2"/>
            <line x1="66" y1="67" x2="254" y2="67" stroke="#e4ddd4" stroke-width="2"/>
            ${umbrella(111, 43)}
            ${shoe(206, 45)}
            ${umbrella(111, 92)}
            <rect x="183" y="75" width="45" height="34" rx="6" fill="#fff7db" stroke="var(--warm)" stroke-width="3" stroke-dasharray="5"/>
            <text x="206" y="101" fill="var(--warm)" font-size="28" font-weight="900" text-anchor="middle">?</text>
          </svg>
        `,
        choices: ["赤い傘", "緑の靴", "青い帽子"],
        correct: 2,
        comment: "上の段は、傘と靴の組み合わせです。下の段も同じにするので、緑の靴が入ります。"
      },
      {
        question: "左の積み木を右へ倒すと、どの形に近くなるでしょう？",
        svg: `
          <svg viewBox="0 0 320 150" aria-label="L字の積み木を右へ倒す問題">
            <text x="80" y="24" fill="var(--ink)" font-size="16" font-weight="900" text-anchor="middle">いまの形</text>
            <g transform="translate(44, 36)">
              ${cube(0, 0, "#8b5cf6")}
              ${cube(34, 0, "#8b5cf6")}
              ${cube(0, 34, "#8b5cf6")}
            </g>
            <path d="M145 61 A34 34 0 0 1 205 61" fill="none" stroke="#e86f00" stroke-width="5" stroke-linecap="round"/>
            <polygon points="207,53 220,64 203,70" fill="#e86f00"/>
            <text x="182" y="111" fill="#e86f00" font-size="15" font-weight="900" text-anchor="middle">右へ倒す</text>
            <rect x="244" y="40" width="56" height="62" rx="8" fill="#fff7db" stroke="var(--warm)" stroke-width="3" stroke-dasharray="5"/>
            <text x="272" y="79" fill="var(--warm)" font-size="30" font-weight="900" text-anchor="middle">?</text>
          </svg>
        `,
        choices: ["横に寝そべったLの形", "まっすぐ縦に立った形", "上下が逆になった形"],
        correct: 1,
        comment: "最後の問題は、動きを想像する練習です。右へ倒すので、横向きに寝そべったLの形に近くなります。"
      }
    ];

    let currentQuestionIndex = 0;
    let score = 0;
    let responseTimes = [];
    let startTime = 0;

    function arrowBox(x, y, rotation) {
      return `
        <g transform="translate(${x}, ${y})">
          <rect x="-27" y="-27" width="54" height="54" rx="9" fill="#fff" stroke="#6b6258" stroke-width="3"/>
          <polygon points="0,-18 -13,8 13,8" fill="#e86f00" transform="rotate(${rotation})"/>
        </g>
      `;
    }

    function smallArrow(x, y) {
      return `
        <g stroke="#aaa198" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none">
          <path d="M${x - 14} ${y} H${x + 12}"/>
          <path d="M${x + 5} ${y - 8} L${x + 13} ${y} L${x + 5} ${y + 8}"/>
        </g>
      `;
    }

    function cube(x, y, color) {
      return `
        <g transform="translate(${x}, ${y})">
          <polygon points="0,18 24,4 48,18 24,32" fill="${color}" stroke="#176889" stroke-width="2"/>
          <polygon points="0,18 24,32 24,58 0,44" fill="#1482ad" stroke="#176889" stroke-width="2"/>
          <polygon points="48,18 24,32 24,58 48,44" fill="#0d5f87" stroke="#176889" stroke-width="2"/>
        </g>
      `;
    }

    function umbrella(x, y) {
      return `
        <g transform="translate(${x - 22}, ${y - 30})">
          <path d="M4,23 Q22,3 40,23" stroke="var(--red)" stroke-width="5" fill="none" stroke-linecap="round"/>
          <line x1="22" y1="23" x2="22" y2="43" stroke="var(--red)" stroke-width="3" stroke-linecap="round"/>
          <path d="M22,43 Q27,49 32,43" stroke="var(--red)" stroke-width="3" fill="none" stroke-linecap="round"/>
        </g>
      `;
    }

    function shoe(x, y) {
      return `
        <g transform="translate(${x - 22}, ${y - 24})">
          <path d="M5,28 L5,39 L42,39 L42,25 Q31,25 24,31 Q17,28 5,28 Z" fill="var(--green)"/>
        </g>
      `;
    }

    function startGame() {
      initAudio();
      document.getElementById("screen-start").classList.add("hidden");
      document.getElementById("screen-result").classList.add("hidden");
      document.getElementById("screen-game").classList.remove("hidden");
      currentQuestionIndex = 0;
      score = 0;
      responseTimes = [];
      loadQuestion();
    }

    function loadQuestion() {
      const q = quizData[currentQuestionIndex];
      document.getElementById("question-number").innerText = `第${currentQuestionIndex + 1}問 / 全${quizData.length}問`;
      document.getElementById("score-display").innerText = `正解 ${score}問`;
      document.getElementById("question-text").innerText = q.question;
      document.getElementById("canvas-area").innerHTML = q.svg;
      document.getElementById("choice-1-text").innerText = q.choices[0];
      document.getElementById("choice-2-text").innerText = q.choices[1];
      document.getElementById("choice-3-text").innerText = q.choices[2];
      document.getElementById("progress-bar").style.width = `${((currentQuestionIndex + 1) / quizData.length) * 100}%`;
      startTime = Date.now();
    }

    function selectAnswer(choiceNum) {
      const q = quizData[currentQuestionIndex];
      responseTimes.push((Date.now() - startTime) / 1000);
      const isCorrect = choiceNum === q.correct;

      if (isCorrect) {
        score++;
        playSound("correct");
        showFeedback(true, q.comment);
      } else {
        playSound("incorrect");
        showFeedback(false, `正解は「${q.choices[q.correct - 1]}」です。${q.comment}`);
      }
    }

    function showFeedback(isCorrect, text) {
      const overlay = document.getElementById("feedback-overlay");
      const icon = document.getElementById("feedback-icon");
      const title = document.getElementById("feedback-title");
      const detail = document.getElementById("feedback-detail");

      icon.innerText = isCorrect ? "○" : "△";
      title.innerText = isCorrect ? "正解です" : "惜しいです";
      title.style.color = isCorrect ? "var(--good)" : "var(--warm)";
      detail.innerText = text;
      overlay.classList.remove("hidden");

      setTimeout(() => {
        overlay.classList.add("hidden");
        currentQuestionIndex++;
        if (currentQuestionIndex < quizData.length) {
          loadQuestion();
        } else {
          showResult();
        }
      }, 2300);
    }

    function showResult() {
      const avgTime = responseTimes.length
        ? responseTimes.reduce((sum, value) => sum + value, 0) / responseTimes.length
        : 0;

      document.getElementById("screen-game").classList.add("hidden");
      document.getElementById("screen-result").classList.remove("hidden");
      document.getElementById("final-score").innerText = score;

      let comment = "";
      if (score >= 6) {
        comment = "形の順番や向きの変化を、よく見て答えられました。今日もいい調子です。";
      } else if (score >= 4) {
        comment = "ゆっくり考えながら取り組めました。続けることで、毎日の変化が見えやすくなります。";
      } else {
        comment = "今日は少し難しい問題もありました。結果よりも、取り組めたことが大切です。";
      }
      document.getElementById("result-comment").innerText = comment;

      const roundedTime = Math.max(1, Math.round(avgTime));
      document.getElementById("family-message").innerText =
        `今日もパズルを完了しました。スコアは7問中${score}問、平均回答時間は約${roundedTime}秒でした。`;
    }

    function resetGame() {
      document.getElementById("screen-result").classList.add("hidden");
      document.getElementById("screen-start").classList.remove("hidden");
    }
  </script>
</body>
</html>
